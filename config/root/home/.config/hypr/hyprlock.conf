general {
    # ...
}

background {
    monitor =
    path = /tmp/current_wall
    blur_passes = 1
    blur_size = 2
    vibrancy = 0.4984
}

shape {
    monitor =
    size = 600, 600
    color = rgba(45, 53, 59, 0.5) 
    rounding = 0
    border_size = 0
    rotate = 45

    position = 0, 0
    halign = center
    valign = center
}

# User Avatar
image {
    monitor =
    path = /usr/share/pfp/eli/480x480.png
    size = 240
    rounding = -1 # change to -1 
    border_size = 6
    border_color = rgba(0,0,0,0.3)
    position = 0, 130
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:10000] whoami
    color = rgba(211, 198, 170, 1.0)
    font_size = 16
    position = 0, -20
    halign = center
    valign = center
}

# 12-hour Clock
label {
    monitor =
    text = $TIME12
    color = rgba(211, 198, 170, 1.0) 
    font_size = 45
    font_family = JetBrains Mono Nerd Font 
    position = 0, -80
    halign = center
    valign = center
}

# Date
label {
    monitor =
    text = cmd[update:1000] echo "$(date +'%A, %d %B')"
    color = rgba(211, 198, 170, 1.0) 
    font_size = 16
    font_family = JetBrains Mono Nerd Font
    position = 0, -130
    halign = center
    valign = center
}

# Input Field
input-field {
    monitor =
    size = 220, 45
    fade_on_empty=false
    outline_thickness = 2
    dots_size = 0.2
    dots_spacing = 0.35
    dots_center = true
    rounding = 0 
    outer_color = rgba(167, 192, 128, 0.0) 
    inner_color = rgba(30, 35, 38, 0.5) 
    font_color = rgba(211, 198, 170, 1.0)
    placeholder_text = <span foreground="##d3c6aa"><i>Password...</i></span>
    fail_text = <span foreground="##d3c6aa"><i>Incorrect ($ATTEMPTS)</i></span>
    capslock_color=rgba(127, 187, 179, 1.0)
    position = 0, -190
    halign = center
    valign = center
}