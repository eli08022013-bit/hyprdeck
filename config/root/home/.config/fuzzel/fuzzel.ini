[main]
font='JetBrains Mono Nerd Font':size=8
dpi-aware=yes
prompt="❯ "
icon-theme=YAMIS
icons-enabled=yes
fields=filename,name,generic
password-character="•"
terminal=kitty
list-executables-in-path=no
anchor=center
x-margin=0
y-margin=0
lines=25
width=40
tabs=8
horizontal-pad=30
vertical-pad=20
inner-pad=2
image-size-ratio=0.5
letter-spacing=0
layer=top
exit-on-keyboard-focus-loss=no

[colors]
background=2d353b9e
text=d3c6aaff
match=a7c080ff
selection=4a444e9e
selection-text=d3c6aaff
selection-match=a7c080ff
border=00000000

[border]
width=0
radius=0

[dmenu]
mode=text
exit-immediately-if-empty=yes